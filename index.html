<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ESP32-CAM Control Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #101c2e;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #b8c7d9;
      font-size: 14px;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 14px;
      color: #d1e7ff;
      font-size: 13px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2c3d55;
      background: #07111f;
      color: white;
      margin-top: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .photo {
      background: #04ada6;
    }

    .video {
      background: #7c3aed;
    }

    .refresh {
      background: #2563eb;
    }

    .play {
      background: #16a34a;
    }

    .pause {
      background: #dc2626;
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      background: #07111f;
      border-radius: 10px;
      font-size: 14px;
      color: #d1e7ff;
      word-break: break-word;
      text-align: left;
      white-space: pre-wrap;
    }

    .preview-box {
      margin-top: 18px;
      background: #07111f;
      border: 1px solid #2c3d55;
      border-radius: 16px;
      padding: 12px;
    }

    img {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #2c3d55;
      display: none;
      background: black;
    }

    .video-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      color: #9fb2c8;
      text-align: left;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #93a4b8;
      line-height: 1.5;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>ESP32-CAM Control 📸</h1>
    <p>Photo capture + 20 sec frame-video playback</p>

    <label>ESP32-CAM IP</label>
    <input
      id="espIp"
      type="text"
      value="http://192.168.31.246"
      placeholder="ESP32 IP e.g. http://192.168.31.246"
    />

    <label>Node.js Server IP</label>
    <input
      id="nodeIp"
      type="text"
      value="http://192.168.31.96:3000"
      placeholder="Node Server e.g. http://192.168.31.96:3000"
    />

    <button class="photo" onclick="capturePhoto()">
      Capture Photo
    </button>

    <button class="video" id="recordBtn" onclick="recordVideo()">
      Record 20 Sec Video
    </button>

    <button class="refresh" onclick="loadLatestPhoto()">
      Load Latest Photo
    </button>

    <button class="refresh" onclick="loadLatestVideoFrames()">
      Load Latest Video
    </button>

    <div class="status" id="status">
Status: Ready
    </div>

    <div class="preview-box">
      <img id="photoPreview" />
      <img id="videoPreview" />

      <div class="video-controls">
        <button class="play" onclick="playVideoFrames()">Play Video</button>
        <button class="pause" onclick="pauseVideoFrames()">Pause Video</button>
      </div>

      <div class="meta" id="videoMeta">
        Video: No frames loaded
      </div>
    </div>

    <div class="hint">
      Note: ESP32-CAM MP4 video nahi banata. Ye JPEG frames bhejta hai. Ye page un frames ko video jaisa play karta hai.
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const photoPreview = document.getElementById("photoPreview");
    const videoPreview = document.getElementById("videoPreview");
    const videoMeta = document.getElementById("videoMeta");
    const recordBtn = document.getElementById("recordBtn");

    let videoFrames = [];
    let currentFrameIndex = 0;
    let videoInterval = null;

    // FPS: ESP32 code me 200ms delay hai, approx 5 FPS
    const playbackFPS = 5;
    const frameDelay = 1000 / playbackFPS;

    function getEspBaseUrl() {
      return document.getElementById("espIp").value.trim().replace(/\/$/, "");
    }

    function getNodeBaseUrl() {
      return document.getElementById("nodeIp").value.trim().replace(/\/$/, "");
    }

    function showStatus(message) {
      statusBox.innerText = message;
    }

    function showPhoto(url) {
      photoPreview.src = url + "?t=" + Date.now();
      photoPreview.style.display = "block";
      videoPreview.style.display = "none";
    }

    function showVideoFrame(url) {
      videoPreview.src = url;
      videoPreview.style.display = "block";
      photoPreview.style.display = "none";
    }

    async function capturePhoto() {
      const espUrl = getEspBaseUrl();

      if (!espUrl) {
        showStatus("Status: Please enter ESP32-CAM IP");
        return;
      }

      showStatus("Status: Capturing photo from ESP32-CAM...");

      try {
        const response = await fetch(`${espUrl}/photo`);
        const data = await response.json();

        showStatus("Photo Trigger Response:\n" + JSON.stringify(data, null, 2));

        setTimeout(loadLatestPhoto, 2500);
      } catch (error) {
        showStatus(
          "Photo Error:\n" +
          error.message +
          "\n\nCheck ESP32 IP, CORS headers, and same WiFi network."
        );
      }
    }

    async function recordVideo() {
      const espUrl = getEspBaseUrl();

      if (!espUrl) {
        showStatus("Status: Please enter ESP32-CAM IP");
        return;
      }

      recordBtn.disabled = true;
      pauseVideoFrames();

      videoFrames = [];
      currentFrameIndex = 0;
      videoMeta.innerText = "Video: Recording started...";
      showStatus("Status: Recording 20 sec video frames...");

      try {
        const response = await fetch(`${espUrl}/video20`);
        const data = await response.json();

        showStatus("Video Trigger Response:\n" + JSON.stringify(data, null, 2));

        // ESP32 returns immediately, but actual upload takes 20 sec.
        // Wait and then fetch frames.
        videoMeta.innerText = "Video: Waiting for frames to finish uploading...";

        setTimeout(async () => {
          await loadLatestVideoFrames();
          playVideoFrames();
          recordBtn.disabled = false;
        }, 23000);

      } catch (error) {
        recordBtn.disabled = false;

        showStatus(
          "Video Error:\n" +
          error.message +
          "\n\nCheck ESP32 IP, CORS headers, and same WiFi network."
        );
      }
    }

    async function loadLatestPhoto() {
      const nodeUrl = getNodeBaseUrl();

      if (!nodeUrl) {
        showStatus("Status: Please enter Node.js Server IP");
        return;
      }

      showStatus("Status: Loading latest photo from Node server...");

      try {
        const response = await fetch(`${nodeUrl}/api/photos`);
        const data = await response.json();

        if (!data.success || !data.photos || data.photos.length === 0) {
          showStatus("No photos found on Node server.");
          return;
        }

        const latestPhoto = data.photos[0];
        const imageUrl = `${nodeUrl}${latestPhoto.url}`;

        showPhoto(imageUrl);

        showStatus("Latest photo loaded:\n" + imageUrl);
      } catch (error) {
        showStatus(
          "Load Photo Error:\n" +
          error.message +
          "\n\nCheck Node server is running on " +
          nodeUrl
        );
      }
    }

    async function loadLatestVideoFrames() {
      const nodeUrl = getNodeBaseUrl();

      if (!nodeUrl) {
        showStatus("Status: Please enter Node.js Server IP");
        return;
      }

      showStatus("Status: Loading latest video frames from Node server...");

      try {
        const response = await fetch(`${nodeUrl}/api/videos/latest`);
        const data = await response.json();

        if (!data.success || !data.frames || data.frames.length === 0) {
          videoMeta.innerText = "Video: No frames found.";
          showStatus("No video frames found on Node server.");
          return;
        }

        videoFrames = data.frames.map(frame => `${nodeUrl}${frame.url}`);
        currentFrameIndex = 0;

        showVideoFrame(videoFrames[0]);

        videoMeta.innerText =
          `Video Loaded: ${data.sessionId}\nFrames: ${videoFrames.length}\nFPS: ${playbackFPS}`;

        showStatus(
          "Latest video frames loaded:\n" +
          "Session: " + data.sessionId + "\n" +
          "Frames: " + videoFrames.length
        );

      } catch (error) {
        showStatus(
          "Load Video Error:\n" +
          error.message +
          "\n\nMake sure Node server has /api/videos/latest endpoint."
        );
      }
    }

    function playVideoFrames() {
      if (!videoFrames || videoFrames.length === 0) {
        showStatus("No video frames loaded. Click 'Load Latest Video' first.");
        return;
      }

      pauseVideoFrames();

      videoInterval = setInterval(() => {
        if (currentFrameIndex >= videoFrames.length) {
          currentFrameIndex = 0;
        }

        showVideoFrame(videoFrames[currentFrameIndex]);

        videoMeta.innerText =
          `Playing frame ${currentFrameIndex + 1} / ${videoFrames.length}`;

        currentFrameIndex++;
      }, frameDelay);
    }

    function pauseVideoFrames() {
      if (videoInterval) {
        clearInterval(videoInterval);
        videoInterval = null;
      }
    }
  </script>
</body>
</html>
